services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: embedlearner-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: embedlearner-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000

  widget-react:
    build:
      context: ./widget-react
      dockerfile: Dockerfile
    container_name: embedlearner-widget
    depends_on:
      - backend
    ports:
      - "5174:5174"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
